<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Νεφέλη & Άρης | Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Poppins, sans-serif;
  background:#fbfaf7;
  color:#2c2c2c;
}

.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
  url('https://images.unsplash.com/photo-1523438097201-512ae7d59c1c') center/cover;
  color:white;
}

.hero h1 {
  font-family:'Playfair Display', serif;
  font-size:60px;
  margin:0;
}

.hero p {
  font-size:18px;
  margin-top:10px;
}

section {
  padding:70px 20px;
  text-align:center;
}

h2 {
  font-family:'Playfair Display', serif;
  font-size:32px;
}

.card {
  background:white;
  max-width:500px;
  margin:15px auto;
  padding:20px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.button {
  display:inline-block;
  margin-top:10px;
  padding:10px 18px;
  background:#556b2f;
  color:white;
  border-radius:8px;
  text-decoration:none;
}

.countdown {
  font-size:26px;
  color:#556b2f;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Νεφέλη & Άρης</h1>
  <p>12 Σεπτεμβρίου 2027 • Καλαμάτα</p>
  <div class="countdown" id="countdown"></div>
</div>

<section>
  <h2>💍 Ο Γάμος μας</h2>
  <p>Με χαρά σας προσκαλούμε στη σημαντικότερη μέρα της ζωής μας.</p>
</section>

<section style="background:#f3f1ea;">
  <h2>📍 Τοποθεσίες</h2>

  <div class="card">
    ⛪ Ι.Ν. Αγίου Γρηγορίου & Κοσμά Αιτωλού<br>
    Καλαμάτα
    <br>
    <a class="button" href="https://www.google.com/maps?q=Ιερός+Ναός+Αγίου+Γρηγορίου+Καλαμάτα" target="_blank">
      Πλοήγηση
    </a>
  </div>

  <div class="card">
    🌿 Κτήμα Αρμονία<br>
    Καλαμάτα
    <br>
    <a class="button" href="https://www.google.com/maps?q=Κτήμα+Αρμονία+Καλαμάτα" target="_blank">
      Πλοήγηση
    </a>
  </div>
</section>

<section>
  <h2>⏳ Αντίστροφη μέτρηση</h2>
  <div class="countdown" id="timer"></div>
</section>

<script>
const wedding = new Date("2027-09-12T17:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const diff = wedding - now;

  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));

  document.getElementById("countdown").innerHTML =
    days + " ημέρες • " + hours + " ώρες";

  document.getElementById("timer").innerHTML =
    days + " ημέρες • " + hours + " ώρες";
}, 1000);
</script>

</body>
</html>
